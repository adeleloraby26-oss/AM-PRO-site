<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AM PRO Auth</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="glow g1"></div>
<div class="glow g2"></div>

<div id="notif" class="notif">
  <i data-lucide="check-circle"></i>
  <span id="notifText"></span>
</div>

<div class="card">
  <div class="top">
    <i data-lucide="lock"></i>
    <h1>AM PRO Login</h1>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab(event,'login')">Login</div>
    <div class="tab" onclick="switchTab(event,'signup')">Create Account</div>
  </div>

  <div id="loginBox">
    <div class="input">
      <i data-lucide="mail" class="leftIcon"></i>
      <input id="loginEmail" type="email" placeholder="Email">
    </div>

    <div class="input">
      <i data-lucide="lock" class="leftIcon"></i>
      <input id="loginPass" type="password" placeholder="Password">
    </div>

    <button onclick="login()">Login</button>
  </div>

  <div id="signupBox" class="hidden">
    <div class="input">
      <i data-lucide="user" class="leftIcon"></i>
      <input id="name" placeholder="Full Name">
    </div>

    <div class="input">
      <i data-lucide="at-sign" class="leftIcon"></i>
      <input id="username" placeholder="Username">
    </div>

    <div class="input">
      <i data-lucide="users" class="leftIcon"></i>
      <select id="gender">
        <option value="">Gender</option>
        <option>Male</option>
        <option>Female</option>
      </select>
    </div>

    <div class="input">
      <i data-lucide="layers" class="leftIcon"></i>
      <select id="field">
        <option value="">Field</option>
        <option>Programming</option>
        <option>Content Creation</option>
        <option>Sports</option>
      </select>
    </div>

    <div class="input">
      <i data-lucide="mail" class="leftIcon"></i>
      <input id="email" type="email" placeholder="Email">
    </div>

    <div class="input">
      <i data-lucide="lock" class="leftIcon"></i>
      <input id="pass" type="password" placeholder="Password">
    </div>

    <div class="input">
      <i data-lucide="shield-check" class="leftIcon"></i>
      <input id="confirmPass" type="password" placeholder="Confirm Password">
    </div>

    <button onclick="signup()">Create Account</button>
  </div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
